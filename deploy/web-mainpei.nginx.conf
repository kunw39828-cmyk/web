# 复制到 /etc/nginx/sites-available/web-mainpei 后启用：
#   sudo ln -sf /etc/nginx/sites-available/web-mainpei /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 请将 root 改为你的项目解压路径下的 dist（示例：/var/www/web-mainpei/dist）

server {
    listen 80;
    server_name _;

    root /var/www/web-mainpei/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 匹配 /api、/api/xxx（前端请求为 /api/...）
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }
}
